server {
    listen 80;
    server_name api.tradalyst.com;

    access_log /var/log/nginx/api.access.log;
    error_log  /var/log/nginx/api.error.log;

    # Serve Django-collected static files directly from disk.
    # Run `python manage.py collectstatic` after each deploy to refresh.
    location /static/ {
        alias /var/www/tradalyst/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # All other requests go to Gunicorn.
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Required for Django CSRF checks and SameSite=None cookies.
        proxy_set_header Origin $http_origin;

        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Increase buffer for large API responses (trade history, AI analysis).
        proxy_buffer_size          16k;
        proxy_buffers              8 16k;
        proxy_busy_buffers_size    32k;
    }
}
