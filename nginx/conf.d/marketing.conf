server {
    listen 80;
    server_name tradalyst.com www.tradalyst.com;

    # Cloudflare terminates TLS — Nginx only sees plain HTTP on port 80.
    # The real client IP is in CF-Connecting-IP / X-Forwarded-For headers.

    access_log /var/log/nginx/marketing.access.log;
    error_log  /var/log/nginx/marketing.error.log;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (Next.js HMR / future use)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Forwarding headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
